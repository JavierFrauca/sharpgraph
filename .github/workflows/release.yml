name: release

# Publica SharpGraph para win-x64, linux-x64 y osx-arm64 y sube los artefactos
# a un release de GitHub. Se dispara al publicar un tag v* (p.ej. v2.1.0).
#
# Antes de taggear:
#   - actualiza Version en src/SharpGraph/SharpGraph.csproj/Program.cs (ServerInfo)
#   - actualiza CHANGELOG / README si procede
#   - git tag v2.1.0 && git push origin v2.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}  # permite dispararlo a mano desde la UI

permissions:
  contents: write   # necesario para crear el release y subir assets

jobs:
  build:
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: ubuntu-latest   # cross-compile es suficiente; .NET no necesita Windows para win-x64
            archive: zip
            installer: install.ps1
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
            installer: install.sh
          - rid: osx-arm64
            os: macos-latest    # macOS para que el binario tenga notarización-ready (aunque no firma)
            archive: tar.gz
            installer: install.sh

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        # Los tests no dependen del RID; corren una sola vez es suficiente, pero
        # correrlos en cada job da signal por plataforma.
        run: dotnet test --no-restore --configuration Release --logger "console;verbosity=normal"

      - name: Publish
        run: |
          dotnet publish src/SharpGraph/SharpGraph.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true \
            -o dist/${{ matrix.rid }}

      - name: Stage installer alongside binary
        shell: bash
        run: cp ${{ matrix.installer }} dist/${{ matrix.rid }}/

      - name: Package (zip)
        if: matrix.archive == 'zip'
        working-directory: dist
        run: |
          # renombramos carpeta interna a SharpGraph-${{ matrix.rid }} para que al descomprimir quede claro
          mv ${{ matrix.rid }} SharpGraph-${{ matrix.rid }}
          (cd SharpGraph-${{ matrix.rid }} && chmod +x SharpGraph 2>/dev/null || true)
          zip -r SharpGraph-${{ matrix.rid }}.zip SharpGraph-${{ matrix.rid }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        working-directory: dist
        run: |
          mv ${{ matrix.rid }} SharpGraph-${{ matrix.rid }}
          chmod +x SharpGraph-${{ matrix.rid }}/SharpGraph 2>/dev/null || true
          tar -czf SharpGraph-${{ matrix.rid }}.tar.gz SharpGraph-${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpGraph-${{ matrix.rid }}
          path: dist/SharpGraph-${{ matrix.rid }}.*

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    # solo crea release en tags (no en disparos manuales de prueba)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/SharpGraph-win-x64.zip
            artifacts/SharpGraph-linux-x64.tar.gz
            artifacts/SharpGraph-osx-arm64.tar.gz
